name: CI workflow

on:
  push:
    branches: [main]
    paths:
      - app.py
      - Dockerfile
      - requirements.txt
      - tests/**
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check the repository
        uses: actions/checkout@v6

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run tests
        run: PYTHONPATH=. pytest -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_BASE_NAME: ghcr.io/${{ github.repository_owner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login do GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker build -t $IMAGE_BASE_NAME/practice-app:latest -t $IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7} .

      - name: Smoke tests
        run: |
          output=$(docker run --rm $IMAGE_BASE_NAME/practice-app:latest)
          if ! echo "$output" | grep -q "Hello from a containerized Python app!"; then 
            echo "Smoke test failed"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Push images to ghcr.io
        run: |
          docker push $IMAGE_BASE_NAME/practice-app:latest
          docker push $IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7}

      - name: Print confirmation
        run: |
          echo "Images built and pushed:"
          echo "$IMAGE_BASE_NAME/practice-app:latest"
          echo "$IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7}"
      