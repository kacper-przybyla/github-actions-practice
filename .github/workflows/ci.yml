name: CI workflow

on:
  push:
    branches: [main]
    paths:
      - app.py
      - Dockerfile
      - requirements.txt
      - tests/**
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check the repository
        uses: actions/checkout@v6

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run tests
        if: "!contains(github.event.head_commit.message, '[skip tests]')"
        run: PYTHONPATH=. pytest -v

      - name: Notify why tests didn't run
        if: contains(github.event.head_commit.message, '[skip tests]')
        run: |
          echo "Tests didn't run because of [skip tests] in head commit message"
          echo "${{ github.event.head_commit.message }}"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_BASE_NAME: ghcr.io/${{ github.repository_owner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker build -t $IMAGE_BASE_NAME/practice-app:latest -t $IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7} .

      - name: Smoke tests
        run: |
          output=$(docker run --rm $IMAGE_BASE_NAME/practice-app:latest)
          if ! echo "$output" | grep -q "Hello from a containerized Python app!";then 
            echo "Smoke test failed"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Push images to ghcr.io
        if: github.event_name != 'pull_request'
        run: |
          docker push $IMAGE_BASE_NAME/practice-app:latest
          docker push $IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7}

      - name: Print confirmation
        if: github.event_name != 'pull_request'
        run: |
          echo "Images built and pushed:"
          echo "$IMAGE_BASE_NAME/practice-app:latest"
          echo "$IMAGE_BASE_NAME/practice-app:${GITHUB_SHA::7}"

      - name: PR confirmation
        if: github.event_name == 'pull_request'
        run: echo "PR build verified - image built successfully but not pushed"

  notify:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Give information about failing    
        run: echo "Pipeline failed on ${{ github.repository }} ${{ github.event_name }}"
  