name: Docker build and push

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image base name
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}
        run: echo IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Build image
        run: docker build -t ${IMAGE_NAME}/practice-app:${GITHUB_SHA::7} -t ${IMAGE_NAME}/practice-app:latest .

      - name: Lists all Docker images on the runner
        run: docker images

      - name: Verify built container
        run: docker run --rm ${IMAGE_NAME}practice-app:latest echo "container works"

      - name: Push images
        run: |
          docker push ${IMAGE_NAME}/practice-app:${GITHUB_SHA::7}
          docker push ${IMAGE_NAME}/practice-app:latest

      - name: Show confirmation
        run: |
          echo "Images pushed:"
          echo "${IMAGE_NAME}/practice-app:${GITHUB_SHA::7}"
          echo "${IMAGE_NAME}/practice-app:latest"
