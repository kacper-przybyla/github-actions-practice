name: Docker build and check

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        run: docker build -t practice-app:${GITHUB_SHA::7} -t practice-app:latest .

      - name: Lists all Docker images on the runner
        run: docker images

      - name: Verify builded conatiner
        run: docker run --rm practice-app:latest echo "container works"

